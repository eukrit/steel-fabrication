# cloudbuild.yaml
# Steel Fabrication — GCP Cloud Build Pipeline
# Triggers: push to main (deploy) | push to dev/* (build+test only)

substitutions:
  _SERVICE: steel-fabrication
  _REGION: asia-southeast1
  _REPO: gcr.io/$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # Step 1: Install Python dependencies
  - name: 'python:3.11-slim'
    id: install
    entrypoint: pip
    args: ['install', '--user', '-r', 'requirements.txt']

  # Step 2: Run tests
  - name: 'python:3.11-slim'
    id: test
    entrypoint: python
    args: ['-m', 'pytest', 'tests/', '-v', '--tb=short']
    env:
      - 'PYTHONPATH=/workspace'

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '-t'
      - '$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REPO/$_SERVICE:latest'
      - '.'

  # Step 4: Push image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', '--all-tags', '$_REPO/$_SERVICE']

  # Step 5: Deploy to Cloud Run (main branch only)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          gcloud run deploy $_SERVICE \
            --image $_REPO/$_SERVICE:$SHORT_SHA \
            --region $_REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=claude@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,SPREADSHEET_ID=18wczPjTPic2GPh0cG_1hwalGXQK3tMzNvU-dmA3aSxk"
          echo "Deployed $_SERVICE:$SHORT_SHA to Cloud Run"
        else
          echo "Branch $BRANCH_NAME: skipping deploy (build+test only)"
        fi

images:
  - '$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REPO/$_SERVICE:latest'

tags:
  - '$_SERVICE'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'
